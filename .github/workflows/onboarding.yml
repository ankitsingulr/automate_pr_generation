name: Onboard New Customer

on:
  workflow_dispatch:
    inputs:
      customer_name:
        description: "Name of the customer to deploy"
        required: true
        type: string
      environment:
        description: "Environment (production/development)"
        required: false
        type: choice
        options:
          - PROD
          - DEV
      image_id:
        description: "Build Images to deploy"
        required: true
        type: string
      auth_project_id:
        description: "Authentication project ID"
        required: false
        default: ""
        type: string
      singulr_platform_instance_type:
        description: "Singulr platform instance type"
        required: false
        type: choice
        options:
          - 
          - "m5.2xlarge"
          - 'm5.4xlarge'
      singulr_graph_instance_type:
        description: "Singulr graph instance type"
        required: false
        type: choice
        options:
          - 
          - m5.xlarge
          - m5.2xlarge
      singulr_collector_instance_type:
        description: "Singulr collector instance type"
        required: false
        type: choice
        options:
          - 
          - m5.xlarge
          - m5.2xlarge
      singulr_psql_instance_type:
        description: "Singulr psql instance type"
        required: false
        type: choice
        options:
          - 
          - db.r5.large
          - db.r5.xlarge
      tenant_id:
        description: "Tenant ID"
        required: false
        type: string
      platform_count:
        description: "Number of platforms to deploy"
        required: false
        type: number
      collector_count:
        description: "Number of collectors to deploy"
        required: false
        type: number
      cert_arn:
        description: "Certificate ARN for SSL"
        required: false
        type: string
      domain_name:
        description: "Domain name"
        required: true
        type: string

jobs:
  deploy-customer:
    if: startsWith(github.ref_name, 'singulr-rc-')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install descope

      - name: Create environment folder
        run: |
          DIR="terraform1/env/${{ github.event.inputs.customer_name }}"
          FILE="$DIR/${{ github.event.inputs.customer_name }}.tfvars"
      
          mkdir -p "$DIR"
      
          echo "customer_name = \"${{ github.event.inputs.customer_name }}\"" > "$FILE"
          echo "aws_region = \"us-east-1\"" >> "$FILE"
          echo "image_id = \"${{ github.event.inputs.image_id }}\"" >> "$FILE"
          echo "domain_name = \"${{ github.event.inputs.domain_name }}\"" >> "$FILE"
      
          # Optional values (only added if provided)
      
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "singulr_env = \"${{ github.event.inputs.environment }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.platform_count }}" ]; then
            echo "platform_count = ${{ github.event.inputs.platform_count }}" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.collector_count }}" ]; then
            echo "collector_count = ${{ github.event.inputs.collector_count }}" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.auth_project_id }}" ]; then
            echo "auth_project_id = \"${{ github.event.inputs.auth_project_id }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_platform_instance_type }}" ]; then
            echo "singulr_platform_instance_type = \"${{ github.event.inputs.singulr_platform_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_graph_instance_type }}" ]; then
            echo "singulr_graph_instance_type = \"${{ github.event.inputs.singulr_graph_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_collector_instance_type }}" ]; then
            echo "collector_instance_type = \"${{ github.event.inputs.singulr_collector_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_psql_instance_type }}" ]; then
            echo "psql_instance_type = \"${{ github.event.inputs.singulr_psql_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.tenant_id }}" ]; then
            echo "default_tenant_id = \"${{ github.event.inputs.tenant_id }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.cert_arn }}" ]; then
            echo "cert_arn = \"${{ github.event.inputs.cert_arn }}\"" >> "$FILE"
          fi
      
          echo "✅ Generated tfvars:"
          cat "$FILE"

          # Create backend-config.hcl file
          cat > terraform1/env/${{ github.event.inputs.customer_name }}/backend-config.hcl << EOF
          backend "s3" {
            encrypt = true
            bucket = "singulr-terraform-state"
            key    = "${{ github.event.inputs.customer_name }}/terraform.tfstate"
            region = "us-east-1"
          }
          EOF

      - name: Update Upgrade Workflow with New Customer
        run: |
          CUSTOMER='${{ github.event.inputs.customer_name }}'
          
          UPGRADE_WORKFLOW=".github/workflows/upgrade_customer_with_image_tag.yaml"
          ROLLBACK_WORKFLOW=".github/workflows/upgrade_ui.yml"  # second workflow
      
          # Function to add customer to workflow options
          add_customer_to_workflow() {
            local workflow=$1
            awk '
              /options:/ { 
                print; 
                print "          - '"'"'"$CUSTOMER"'"'"'";
                next 
              } 
              { print } 
            ' "$workflow" > "$workflow.tmp" && mv "$workflow.tmp" "$workflow"
            echo "Added $CUSTOMER to $workflow"
          }
      
          # Update both workflows
          add_customer_to_workflow "$UPGRADE_WORKFLOW"
          add_customer_to_workflow "$ROLLBACK_WORKFLOW"

      - name: Update Tenant Details
        id: update-tenant-details
        run: |
    
          # For local testing: uncomment and set manual Terraform outputs
           TERRAFORM_OUTPUTS='{
             "deployment_id": "test-deployment-123",
             "tenant_id": "00000000-0000-0000-0000-000000000001",
             "cloudfront_distribution_id": "E1234567890ABCDEF",
             "s3_bucket_name": "test-bucket-name",
             "project_id": "test-project-id"
           }'
          
          # For production: use actual Terraform outputs
          # TERRAFORM_OUTPUTS='${{ steps.terraform_outputs.outputs.terraform_outputs }}'
          
          DEPLOYMENT_ID=$(echo "$TERRAFORM_OUTPUTS" | jq -r '.deployment_id // ""')
          PLATFORM="${DEPLOYMENT_ID}-platform-0.setups.support-tunnel.singulr.ai"  # Matches Terraform pattern: "${local.deployment_id_result}-platform-${count.index}.setups.support-tunnel.singulr.ai"
          COLLECTORS='[]'  # From workflow input, matches var.collector in Terraform
          TENANT_ID=$(echo "$TERRAFORM_OUTPUTS" | jq -r '.tenant_id // ""')
          TENANT_ENDPOINT="https://api.${{ github.event.inputs.domain_name }}"  # Matches "https://api.${var.domain_name}" in Terraform
          CUSTOMER_NAME="${{ github.event.inputs.customer_name }}"  # Matches var.customer_name in Terraform
          DISTRIBUTION_ID=$(echo "$TERRAFORM_OUTPUTS" | jq -r '.cloudfront_distribution_id // ""')  # Matches aws_cloudfront_distribution.ui_distribution.id
          BUCKET_NAME=$(echo "$TERRAFORM_OUTPUTS" | jq -r '.s3_bucket_name // ""')  # Matches aws_s3_bucket.ui_bucket.bucket
          DESCOPPE_PROJECT_ID=$(echo "$TERRAFORM_OUTPUTS" | jq -r '.project_id // ""')  # Matches descope_project.my-project.id
          
          echo "Running tenant details update script with:"
          echo "Platform: $PLATFORM"
          echo "Collectors: $COLLECTORS"
          echo "Tenant ID: $TENANT_ID"
          echo "Tenant Endpoint: $TENANT_ENDPOINT"
          echo "Customer Name: $CUSTOMER_NAME"
          echo "Distribution ID: $DISTRIBUTION_ID"
          echo "Bucket Name: $BUCKET_NAME"
          echo "Descope Project ID: $DESCOPPE_PROJECT_ID"
          
          # Execute the Python script exactly as Terraform data.tf does
          python3 updating_json.py \
            "$PLATFORM" \
            "$COLLECTORS" \
            "$TENANT_ID" \
            "$TENANT_ENDPOINT" \
            "$CUSTOMER_NAME" \
            "$DISTRIBUTION_ID" \
            "$BUCKET_NAME" \
            "$DESCOPPE_PROJECT_ID"
          
          echo "Tenant details updated successfully"

      - name: Deploy UI for Customer
        run: |
          yarn install
          yarn deploy:env "test"
          
          echo "UI deployment completed successfully"

      - name: Create feature branch
        id: create_branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b feature/customer-${{ github.event.inputs.customer_name }}
          git add .
          git commit -m "Add new customer: ${{ github.event.inputs.customer_name }}

          - New tenant configuration files
          - Updated tenant_details.json with new tenant ID
          - Infrastructure deployment for ${{ github.event.inputs.customer_name }}

          Auto-generated by GitHub Actions workflow."
          git push origin feature/customer-${{ github.event.inputs.customer_name }}

          # Generate the compare URL for the new branch
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/master...feature/customer-${{ github.event.inputs.customer_name }}"
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT
          echo "Branch created: feature/customer-${{ github.event.inputs.customer_name }}"
          echo "Compare URL: $COMPARE_URL"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Customer Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Customer Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Customer Name:** ${{ github.event.inputs.customer_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain:** ${{ github.event.inputs.domain_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image ID:** ${{ github.event.inputs.image_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          
          echo "### :link: Links" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch Comparison:** [Create PR from ${{ steps.create_branch.outputs.compare_url }}](${{ steps.create_branch.outputs.compare_url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
  
