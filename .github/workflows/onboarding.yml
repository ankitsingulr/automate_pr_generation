name: Onboard New Customer

on:
  workflow_dispatch:
    inputs:
      customer_name:
        description: "Name of the customer to deploy"
        required: true
        type: string
      environment:
        description: "Environment (production/development)"
        required: false
        type: choice
        options:
          - PROD
          - DEV
      image_id:
        description: "Build Images to deploy"
        required: true
        type: string
      auth_project_id:
        description: "Authentication project ID"
        required: false
        default: ""
        type: string
      singulr_platform_instance_type:
        description: "Singulr platform instance type"
        required: false
        type: choice
        options:
          - 
          - m5.2xlarge
          - m5.4xlarge
      singulr_graph_instance_type:
        description: "Singulr graph instance type"
        required: false
        type: choice
        options:
          - 
          - m5.xlarge
          - m5.2xlarge
      singulr_collector_instance_type:
        description: "Singulr collector instance type"
        required: false
        type: choice
        options:
          - 
          - m5.xlarge
          - m5.2xlarge
      singulr_psql_instance_type:
        description: "Singulr psql instance type"
        required: false
        type: choice
        options:
          - 
          - db.r5.large
          - db.r5.xlarge
      tenant_id:
        description: "Tenant ID"
        required: false
        type: string
      platform_count:
        description: "Number of platforms to deploy"
        required: false
        type: number
      collector_count:
        description: "Number of collectors to deploy"
        required: false
        type: number
      cert_arn:
        description: "Certificate ARN for SSL"
        required: false
        type: string
      domain_name:
        description: "Domain name"
        required: true
        type: string
  workflow_call:
    outputs:
      pr_url:
        description: "generated pr url"
        value: ${{ jobs.deploy-customer.outputs.pr_url }}

jobs:
  deploy-customer:
    outputs:
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write   
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install descope

      - name: Create environment folder
        run: |
          DIR="terraform1/env/${{ github.event.inputs.customer_name }}"
          FILE="$DIR/${{ github.event.inputs.customer_name }}.tfvars"
      
          mkdir -p "$DIR"
      
          echo "customer_name = \"${{ github.event.inputs.customer_name }}\"" > "$FILE"
          echo "aws_region = \"us-east-1\"" >> "$FILE"
          echo "image_id = \"${{ github.event.inputs.image_id }}\"" >> "$FILE"
          echo "domain_name = \"${{ github.event.inputs.domain_name }}\"" >> "$FILE"
      
          # Optional values (only added if provided)
      
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "singulr_env = \"${{ github.event.inputs.environment }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.platform_count }}" ]; then
            echo "platform_count = ${{ github.event.inputs.platform_count }}" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.collector_count }}" ]; then
            echo "collector_count = ${{ github.event.inputs.collector_count }}" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.auth_project_id }}" ]; then
            echo "auth_project_id = \"${{ github.event.inputs.auth_project_id }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_platform_instance_type }}" ]; then
            echo "singulr_platform_instance_type = \"${{ github.event.inputs.singulr_platform_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_graph_instance_type }}" ]; then
            echo "singulr_graph_instance_type = \"${{ github.event.inputs.singulr_graph_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_collector_instance_type }}" ]; then
            echo "collector_instance_type = \"${{ github.event.inputs.singulr_collector_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.singulr_psql_instance_type }}" ]; then
            echo "psql_instance_type = \"${{ github.event.inputs.singulr_psql_instance_type }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.tenant_id }}" ]; then
            echo "default_tenant_id = \"${{ github.event.inputs.tenant_id }}\"" >> "$FILE"
          fi
      
          if [ -n "${{ github.event.inputs.cert_arn }}" ]; then
            echo "cert_arn = \"${{ github.event.inputs.cert_arn }}\"" >> "$FILE"
          fi
      
          echo "✅ Generated tfvars:"
          cat "$FILE"

          # Create backend-config.hcl file
          cat > terraform1/env/${{ github.event.inputs.customer_name }}/backend-config.hcl << EOF
          backend "s3" {
            encrypt = true
            bucket = "singulr-terraform-state"
            key    = "${{ github.event.inputs.customer_name }}/terraform.tfstate"
            region = "us-east-1"
          }
          EOF

      - name: Initialize Terraform
        run: |
          cd terraform1
          terraform init -var env/${{ github.event.inputs.customer_name }}/${{ github.event.inputs.customer_name }}.tfvars -reconfigure

      - name: Plan Terraform
        run: |
          cd terraform1
          terraform plan -var-file=env/${{ github.event.inputs.customer_name }}/${{ github.event.inputs.customer_name }}.tfvars

      - name: Apply Terraform
        run: |
          cd terraform1
          terraform apply -auto-approve -var-file=env/${{ github.event.inputs.customer_name }}/${{ github.event.inputs.customer_name }}.tfvars

      - name: Capture Terraform Outputs
        id: terraform_outputs
        run: |
          cd terraform1
          terraform output -json > terraform_outputs.json
          
          # Store outputs as workflow variables
          echo "cert_arn=$(terraform output -raw cert_arn)" >> $GITHUB_OUTPUT
          echo "tenant_id=$(terraform output -raw tenant_id)" >> $GITHUB_OUTPUT
          
          echo "✅ Terraform outputs captured"

      - name: Create feature branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b feature/customer-${{ github.event.inputs.customer_name }}
          git add .
          git commit -m "Add new customer: ${{ github.event.inputs.customer_name }}

          - New tenant configuration files
          - Updated tenant_details.json with new tenant ID
          - Infrastructure deployment for ${{ github.event.inputs.customer_name }}

          Auto-generated by GitHub Actions workflow."
          git push origin feature/customer-${{ github.event.inputs.customer_name }}

      - name: Create Pull Request
        id: create_pr
        run: |
          # Create PR using GitHub REST API
          PR_BODY=$(cat << EOF
          This PR adds infrastructure for new customer ${{ github.event.inputs.customer_name }}.

          ## Changes
          - New tenant configuration files in env/${{ github.event.inputs.customer_name }}/
          - Updated tenant_details.json with new tenant ID
          - Infrastructure deployment for ${{ github.event.inputs.customer_name }}

          Auto-generated by GitHub Actions workflow.
          EOF
          )

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d '{
              "title": "Onboard new customer: ${{ github.event.inputs.customer_name }}",
              "body": '"$(echo "$PR_BODY" | jq -R -s .)"',
              "head": "feature/customer-${{ github.event.inputs.customer_name }}",
              "base": "master",
              "labels": ["READY FOR MERGE"]
            }')

          PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url')
          
          if [ "$PR_URL" = "null" ]; then
            echo "❌ Failed to create PR"
            echo "$PR_RESPONSE"
            exit 1
          fi
            
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✅ PR created: $PR_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Show PR URL
        run: |
          echo "PR URL: ${{ steps.create_pr.outputs.pr_url }}"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Customer Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Customer Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Customer Name:** ${{ github.event.inputs.customer_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain:** ${{ github.event.inputs.domain_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image ID:** ${{ github.event.inputs.image_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- **Pull Request:** [View PR](${{ steps.create_pr.outputs.pr_url }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Configuration Files:** [View Files](https://github.com/${{ github.repository }}/tree/feature/customer-${{ github.event.inputs.customer_name }}/deployment/terraform/platform/env/${{ github.event.inputs.customer_name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
  
