name: Onboard New Customer

on:
  workflow_dispatch:
    inputs:
      customer_names:
        description: "Name of the customer to deploy"
        required: true
        type: string
      environment:
        description: "Environment (production/development)"
        required: false
        type: choice
        options:
          - PROD
          - DEV
      image_id:
        description: "Build Images to deploy"
        required: true
        type: string
      auth_project_id:
        description: "Authentication project ID"
        required: false
        default: ""
        type: string
      singulr_platform_instance_type:
        description: "Singulr platform instance type"
        required: false
        type: choice
        options:
          - 
          - "m5.2xlarge"
          - 'm5.4xlarge'
      singulr_graph_instance_type:
        description: "Singulr graph instance type"
        required: false
        type: choice
        options:
          - 
          - m5.xlarge
          - m5.2xlarge
      singulr_collector_instance_type:
        description: "Singulr collector instance type"
        required: false
        type: choice
        options:
          - 
          - m5.xlarge
          - m5.2xlarge
      singulr_psql_instance_type:
        description: "Singulr psql instance type"
        required: false
        type: choice
        options:
          - 
          - db.r5.large
          - db.r5.xlarge
      tenant_id:
        description: "Tenant ID"
        required: false
        type: string
      platform_count:
        description: "Number of platforms to deploy"
        required: false
        type: number
      collector_count:
        description: "Number of collectors to deploy"
        required: false
        type: number
      cert_arn:
        description: "Certificate ARN for SSL"
        required: false
        type: string
      domain_name:
        description: "Domain name"
        required: true
        type: string

jobs:
  deploy-customer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install descope


      - name: Update Upgrade Workflows with New Customer
        run: |
          CUSTOMER="${{ github.event.inputs.customer_names }}"

          UPGRADE_WORKFLOW=".github/workflows/build_and_push_ai_controller.yml"

          add_customer_to_workflow() {
            local workflow=$1
            if grep -qE "^[[:space:]]+-[[:space:]]+\"${CUSTOMER}\"[[:space:]]*\$" "$workflow"; then
              echo "$CUSTOMER already present in $workflow options, skipping"
              return
            fi
            awk '
              /options:/ {
                print;
                print "          - \"'"$CUSTOMER"'\"";
                next
              }
              { print }
            ' "$workflow" > "$workflow.tmp" && mv "$workflow.tmp" "$workflow"
            echo "Added $CUSTOMER to $workflow"
          }

          add_customer_to_workflow "$UPGRADE_WORKFLOW"

          # Add deploy job template (only if not already present).
          # NOTE on escaping:
          #  - The heredoc is quoted (<<'EOF') so bash performs NO expansion.
          #    That keeps $instance / $instances / $(...) literal in the output.
          #  - GitHub Actions still scans this YAML for ${{ ... }} expressions
          #    and substitutes them BEFORE bash runs. To emit a literal "${{"
          #    in the appended file, we use the documented GHA escape:
          #        ${{ '${{' }}    -> evaluates to the literal text "${{"
          #  - The customer name is stamped in afterwards via sed using the
          #    placeholder __CUSTOMER__.
          if grep -q "^  deploy-${CUSTOMER}:" "$UPGRADE_WORKFLOW"; then
            echo "deploy-${CUSTOMER} already present in $UPGRADE_WORKFLOW, skipping append"
          else
            sed "s/__CUSTOMER__/${CUSTOMER}/g" >> "$UPGRADE_WORKFLOW" <<'EOF'

            deploy-__CUSTOMER__:
              needs: [validate-inputs, build, sync-deployment-scripts]
              if: |
                always() && 
                needs.validate-inputs.result == 'success' && 
                (needs.build.result == 'success' || needs.validate-inputs.outputs.skip_build == true) &&
                needs.validate-inputs.outputs.skip_deployment != true &&
                (needs.validate-inputs.outputs.upgrade_server == 'all' || needs.validate-inputs.outputs.upgrade_server == 'all-customer' || needs.validate-inputs.outputs.upgrade_server == '__CUSTOMER__')
              runs-on: self-hosted
              env:
                GCP_PROJECT: "singulr-vertex-ai"
                GCP_SA_KEY: ${{ '${{' }} secrets.GCP_SA_KEY }}
                GCP_ZONE: "us-central1-a"
                RELEASE_TAG: ${{ '${{' }} needs.validate-inputs.outputs.skip_build == true && needs.validate-inputs.outputs.release_tag != '' && needs.validate-inputs.outputs.release_tag || needs.build.outputs.release_tag }}
                INSTANCE_GROUP: "__CUSTOMER__-ai-controller-instance-group"
              steps:
                - name: Authenticate to Google Cloud
                  uses: google-github-actions/auth@v1
                  with:
                    credentials_json: ${{ '${{' }} secrets.GCP_SA_KEY }}

                - name: Set up Google Cloud SDK
                  uses: google-github-actions/setup-gcloud@v1
                  with:
                    project_id: ${{ '${{' }} env.GCP_PROJECT }}

                - name: Deploy to __CUSTOMER__ ai-controller
                  run: |
                    set -x
                    echo "Deploying to ${{ '${{' }} env.INSTANCE_GROUP }} instance group"

                    instances=$(gcloud compute instance-groups list-instances \
                      "${{ '${{' }} env.INSTANCE_GROUP }}" \
                      --zone="${{ '${{' }} env.GCP_ZONE }}" \
                      --format="value(instance)" 2>/dev/null || echo "")

                    if [[ -z "$instances" ]]; then
                      echo "No instances found in ${{ '${{' }} env.INSTANCE_GROUP }} or instance group does not exist, skipping..."
                      exit 0
                    fi

                    for instance in $instances; do
                      echo "Upgrading instance: $instance in ${{ '${{' }} env.INSTANCE_GROUP }}"
                      gcloud compute ssh ubuntu@"$instance" \
                      --zone=${{ '${{' }} env.GCP_ZONE }} \
                      --command='
                        echo "Updating BUILD.INFO"
                        sed -i "s/^IMAGE_ID=.*/IMAGE_ID=${{ '${{' }} env.RELEASE_TAG }}/" /home/ubuntu/deployment/BUILD.INFO
                        echo "Running upgrade services command"
                        aws s3 cp s3://singulr-ai-internal-bucket/ai-platform/start_ai_controller.sh /home/ubuntu/start_ai_controller.sh
                        aws s3 cp s3://singulr-ai-internal-bucket/ai-platform/start_ai_platform_infra.sh /home/ubuntu/start_ai_platform_infra.sh
                        bash /home/ubuntu/start_ai_controller.sh
                        docker image prune -a -f --filter "until=24h"
                      '
                    done
          EOF

            echo "Added deploy job template for $CUSTOMER to $UPGRADE_WORKFLOW"
          fi


      - name: Create feature branch
        id: create_branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b feature/customer-${{ github.event.inputs.customer_name }}
          git add .
          git commit -m "Add new customer: ${{ github.event.inputs.customer_name }}

          - New tenant configuration files
          - Updated tenant_details.json with new tenant ID
          - Infrastructure deployment for ${{ github.event.inputs.customer_name }}

          Auto-generated by GitHub Actions workflow."
          git push origin feature/customer-${{ github.event.inputs.customer_name }}

          # Generate the compare URL for the new branch
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/master...feature/customer-${{ github.event.inputs.customer_name }}"
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT
          echo "Branch created: feature/customer-${{ github.event.inputs.customer_name }}"
          echo "Compare URL: $COMPARE_URL"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Customer Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Customer Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Customer Name:** ${{ github.event.inputs.customer_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain:** ${{ github.event.inputs.domain_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image ID:** ${{ github.event.inputs.image_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          
          echo "### :link: Links" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch Comparison:** [Create PR from ${{ steps.create_branch.outputs.compare_url }}](${{ steps.create_branch.outputs.compare_url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
  
