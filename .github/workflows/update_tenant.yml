name: update tenant
on: 
  workflow_dispatch: 

jobs:
  update-tenant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
            aws-region: us-east-1
  
      - name: Setup jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Process tenant_details and upload to S3
        env:
          BUCKET: "singulr-ai-internal-bucket"
        run: |
          set -euo pipefail
  
          INPUT_FILE="test/tenant_details.json"
          OUTPUT_FILE="env_detail.json"
          S3_KEY="Customer_details/env_detail.json"
  
          echo "Building ${OUTPUT_FILE} from tenant_details.json (one object per tenant key)..."
  
          jq '
            with_entries(
              .key as $tenant |
              .value as $v |
              .value = (
                {}
                | if $v.platform then .PLATFORM_DEP_ID = $v.platform else . end
                | if $v.tenant_id then .TENANT_ID = $v.tenant_id else . end
                | if $v.domain then .URL = $v.domain else . end
                | if $v.user then .USER = $v.user else . end
                | if $v.collectors then .COLLECTORS_DEP_IDS = $v.collectors else . end
                | .CUSTOMER = $tenant
              )
            )
          ' "$INPUT_FILE" > "$OUTPUT_FILE"
  
          echo "Uploading s3://${BUCKET}/${S3_KEY}"
          cat "$OUTPUT_FILE"
  
          aws s3 cp "$OUTPUT_FILE" "s3://${BUCKET}/${S3_KEY}"
  
          rm -f "$OUTPUT_FILE"
          echo "✅ Upload complete"
