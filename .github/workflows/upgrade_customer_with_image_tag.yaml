name: Upgrade customer env with image tag

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Customer Env to upgrade'
        required: true
        type: choice
        default: 'wwt'
        options:
          - "test1234o"
          - 'magicleap'
          - 'ringcentral'
          - 'wwt'
          - 'gartner'
          - 'deltadental'
          - 'kvc'
          - 'trace3'
          - 'netscout'
          - 'halock'
          - 'nisa'
          - 'incyte'
          - 'jfshea'
          - 'hivepro'
          - 'hear'
          - 'ccu'
          - 'bsca'
          - 'fis'
          - 'nttj'
          - 'sbs'
      image_tag:
        description: 'Docker image tag to upgrade ex: 0.9.0-8eb15e1-20240814111632'
        required: true

run-name: Upgrade ${{ inputs.environment }} with image tag ${{ inputs.image_tag }}

jobs:
  Stop-collector:
    runs-on: [self-hosted, upgrade]

    steps:
    - name: Print Inputs
      run: |
        echo "Workflow was called with following inputs:" >> $GITHUB_STEP_SUMMARY
        echo '```json' >> $GITHUB_STEP_SUMMARY
        echo "${{ toJSON(github.event.inputs) }}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SUPPORT_HOST_SSH_KEY }}

    - name: Configure SSH for Jump Box and Target Host
      env:
        HOST_MAP: ${{ vars.TENANT_DETAILS }}
      run: |
        set -x
        mkdir -p ~/.ssh

        # Add jump box configuration
        echo "Host support" > ~/.ssh/config
        echo "  HostName support-tunnel-singulr.singulr.ai" >> ~/.ssh/config
        echo "  User ubuntu" >> ~/.ssh/config
        echo "  IdentityFile ~/.ssh/ec2-ubuntu-deepak.pem" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "" >> ~/.ssh/config

        # Save the jump box and target host keys
        echo "${{ secrets.SUPPORT_HOST_SSH_KEY }}" > ~/.ssh/ec2-ubuntu-deepak.pem
        chmod 600 ~/.ssh/ec2-ubuntu-deepak.pem

        echo "${{ secrets.PLATFORM_SSH_KEY }}" > ~/.ssh/dev_env_madan.pem
        chmod 600 ~/.ssh/dev_env_madan.pem

    - name: Stop collector server
      env:
        HOST_MAP: ${{ vars.TENANT_DETAILS }}
      run: |

        ENV=${{ github.event.inputs.environment }}
        COLLECTORS_HOST=$(echo "$HOST_MAP" | jq -r .[\"$ENV\"].collectors)

        if [[ -z "$COLLECTORS_HOST" || "$COLLECTORS_HOST" == "null" || "$COLLECTORS_HOST" == "[]" ]]; then
            echo "No collector host found"
        fi

        echo $COLLECTORS_HOST | jq -r '.[]' | while read COLLECTOR_HOST; do

          echo "Stop $COLLECTOR_HOST"
          echo "Host $COLLECTOR_HOST" >> ~/.ssh/config
          echo "  HostName $COLLECTOR_HOST" >> ~/.ssh/config
          echo "  User console" >> ~/.ssh/config
          echo "  ProxyJump support" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/dev_env_madan.pem" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "" >> ~/.ssh/config

          ssh $COLLECTOR_HOST << 'EOF'
            sudo /home/ubuntu/mgmt-cli/mgmt-cli-driver stop
        EOF
        done

  Upgrade-platform:
    runs-on: [self-hosted, upgrade]
    needs: Stop-collector
    steps:
    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SUPPORT_HOST_SSH_KEY }}

    - name: Configure SSH for Jump Box and Target Host
      env:
        HOST_MAP: ${{ vars.TENANT_DETAILS }}
      run: |
        set -x
        mkdir -p ~/.ssh

        ENV=${{ github.event.inputs.environment }}
        
        PLATFORM_HOST=$(echo "$HOST_MAP" | jq -r .[\"$ENV\"].platform )

        # Add jump box configuration
        echo "Host support" > ~/.ssh/config
        echo "  HostName support-tunnel-singulr.singulr.ai" >> ~/.ssh/config
        echo "  User ubuntu" >> ~/.ssh/config
        echo "  IdentityFile ~/.ssh/ec2-ubuntu-deepak.pem" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "" >> ~/.ssh/config

        # Add the platform host's configuration
        echo "Host $ENV" >> ~/.ssh/config
        echo "  HostName $PLATFORM_HOST" >> ~/.ssh/config
        echo "  User console" >> ~/.ssh/config
        echo "  ProxyJump support" >> ~/.ssh/config
        echo "  IdentityFile ~/.ssh/dev_env_madan.pem" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "" >> ~/.ssh/config

        # Save the jump box and target host keys
        echo "${{ secrets.SUPPORT_HOST_SSH_KEY }}" > ~/.ssh/ec2-ubuntu-deepak.pem
        chmod 600 ~/.ssh/ec2-ubuntu-deepak.pem

        echo "${{ secrets.PLATFORM_SSH_KEY }}" > ~/.ssh/dev_env_madan.pem
        chmod 600 ~/.ssh/dev_env_madan.pem

    - name: Upgrade platform server
      run: |
        set -x
        TARGET_HOST_ALIAS=${{ github.event.inputs.environment }}
        ssh $TARGET_HOST_ALIAS << 'EOF'
          # execute the upgrade command
          sudo /home/ubuntu/mgmt-cli/mgmt-cli-driver upgrade-services ${{ github.event.inputs.image_tag }}
        EOF

  Upgrade-collector:
    runs-on: [self-hosted, upgrade]
    needs: Upgrade-platform

    steps:
    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SUPPORT_HOST_SSH_KEY }}

    - name: Configure SSH for Jump Box and Target Host
      env:
        HOST_MAP: ${{ vars.TENANT_DETAILS }}
      run: |
        set -x
        mkdir -p ~/.ssh

        ENV=${{ github.event.inputs.environment }}
        
        PLATFORM_HOST=$(echo "$HOST_MAP" | jq -r .[\"$ENV\"].platform )

        # Add jump box configuration
        echo "Host support" > ~/.ssh/config
        echo "  HostName support-tunnel-singulr.singulr.ai" >> ~/.ssh/config
        echo "  User ubuntu" >> ~/.ssh/config
        echo "  IdentityFile ~/.ssh/ec2-ubuntu-deepak.pem" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "" >> ~/.ssh/config

        # Save the jump box and target host keys
        echo "${{ secrets.SUPPORT_HOST_SSH_KEY }}" > ~/.ssh/ec2-ubuntu-deepak.pem
        chmod 600 ~/.ssh/ec2-ubuntu-deepak.pem

        echo "${{ secrets.PLATFORM_SSH_KEY }}" > ~/.ssh/dev_env_madan.pem
        chmod 600 ~/.ssh/dev_env_madan.pem

    - name: Upgrade collector server
      env:
        HOST_MAP: ${{ vars.TENANT_DETAILS }}
      run: |

        ENV=${{ github.event.inputs.environment }}
        COLLECTORS_HOST=$(echo "$HOST_MAP" | jq -r .[\"$ENV\"].collectors)

        if [[ -z "$COLLECTORS_HOST" || "$COLLECTORS_HOST" == "null" || "$COLLECTORS_HOST" == "[]" ]]; then
            echo "No collector host found"
        fi

        echo $COLLECTORS_HOST | jq -r '.[]' | while read COLLECTOR_HOST; do

          echo "Upgrading $COLLECTOR_HOST"
          echo "Host $COLLECTOR_HOST" >> ~/.ssh/config
          echo "  HostName $COLLECTOR_HOST" >> ~/.ssh/config
          echo "  User console" >> ~/.ssh/config
          echo "  ProxyJump support" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/dev_env_madan.pem" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "" >> ~/.ssh/config

          ssh $COLLECTOR_HOST << 'EOF'
            sudo /home/ubuntu/mgmt-cli/mgmt-cli-driver upgrade-services ${{ github.event.inputs.image_tag }}
        EOF
        done

  Upgrade-ui:
    needs: Upgrade-platform
    runs-on: [self-hosted, upgrade]

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      run: aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

    - name: Run docker image to deploy singulr ui
      run: |
        set -x
        ENV=${{ github.event.inputs.environment }}
        IMAGE_TAG=${{ github.event.inputs.image_tag }}
        docker run \
        -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
        -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
        -e AWS_REGION=${{ secrets.AWS_REGION }} \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/singulr-ui:$IMAGE_TAG deploy:env $ENV

  notify:
    runs-on: ubuntu-latest
    needs: 
    - Upgrade-ui
    - Upgrade-collector
    steps:
    - name: Send message to Slack
      env:
        SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        USERNAME: ${{ github.actor }}
        ENVIRONMENT: ${{ github.event.inputs.environment }}
        IMAGE_ID: ${{ github.event.inputs.image_tag }}
        CHANNEL: ${{ vars.PROD_UPGRADE_NOTIFICATION_CHANNEL }}
      run: |
        curl -X POST \
        -H "Authorization:Bearer $SLACK_TOKEN" \
        -H "Content-type: application/json; charset=utf-8" \
        --data "$(jq -n --arg channel "$CHANNEL" \
                        --arg environment "$ENVIRONMENT" \
                        --arg username "$USERNAME" \
                        --arg image_id "$IMAGE_ID" \
                        '{
                          channel: $channel,
                          text: ":rocket: *Upgrade Notification* :rocket:\n\n :earth_africa: *Environment:* `\($environment)`\n:bust_in_silhouette: *User:* `\($username)`\n:package: *Image ID:* `\($image_id)`",
                          username: "GitHub Actions",
                          icon_emoji: ":octocat:"
                        }')" \
        https://slack.com/api/chat.postMessage
