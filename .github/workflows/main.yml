name: Onboard New Customer

on:
  workflow_dispatch:
    inputs:
      customer_names:
        description: 'Name of the customer to deploy'
        required: true
        type: string
      model_customer_names:
        description: 'Name of the model customer to deploy'
        required: false
        type: string
      
jobs:
  deploy-customer:
    runs-on: self-hosted
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Create environment folder
        run: |
          DIR="terraform1/${{ github.event.inputs.customer_names }}"
          FILE="$DIR/terraform.tfvars"
      
          mkdir -p "$DIR"
      
          echo "customer_names = [\"${{ github.event.inputs.customer_names }}\"]" > "$FILE"
          if [ "${{ github.event.inputs.model_customer_names }}" != "[]" ] && [ "${{ github.event.inputs.model_customer_names }}" != "" ]; then
            echo "model_customer_names = [\"${{ github.event.inputs.model_customer_names }}\"]" >> "$FILE"
          else
            echo "model_customer_names = []" >> "$FILE"
          fi
          
          echo "✅ Generated tfvars:"
          cat "$FILE"
          
          # Create backend.hcl file
          cat > deployment/terraform/ai-controller-gcp/${{ github.event.inputs.customer_names }}/backend.hcl << EOF
          bucket = "singulr-terraform-state-file"
          key    = "ai-controller-gcp/${{ github.event.inputs.customer_names }}/terraform.tfstate"
          region = "us-east-1"
          EOF

      - name: Update Upgrade Workflows with New Customer
        run: |
          CUSTOMER="${{ github.event.inputs.customer_names }}"
          
          UPGRADE_WORKFLOW=".github/workflows/build_and_push_ai_controller.yml
      
          add_customer_to_workflow() {
            local workflow=$1
            awk '
              /options:/ { 
                print; 
                print "          - \"'"$CUSTOMER"'\"";
                next 
              } 
              { print } 
            ' "$workflow" > "$workflow.tmp" && mv "$workflow.tmp" "$workflow"
            echo "Added $CUSTOMER to $workflow"
          }
      
          add_customer_to_workflow "$UPGRADE_WORKFLOW"

      - name: Create feature branch
        id: create_branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b feature/ai-contoller-${{ github.event.inputs.customer_names }}
          git add .
          git commit -m "Add new ai-controller customer: ${{ github.event.inputs.customer_names }}

          - Infrastructure deployment for ${{ github.event.inputs.customer_names }}
          - Update upgrade workflows with new customer

          Auto-generated by GitHub Actions workflow."
          git push origin feature/ai-contoller-${{ github.event.inputs.customer_names }}

          COMPARE_URL="https://github.com/${{ github.repository }}/compare/master...feature/ai-contoller-${{ github.event.inputs.customer_names }}"
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT
          echo "Branch created: feature/ai-contoller-${{ github.event.inputs.customer_names }}"
          echo "Compare URL: $COMPARE_URL"

      - name: Deployment Summary
        run: |
          echo "## :rocket: Customer Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### :information_source: Customer Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Customer Name:** ${{ github.event.inputs.customer_names }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### :link: Links" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch Comparison:** [Create PR from ${{ steps.create_branch.outputs.compare_url }}](${{ steps.create_branch.outputs.compare_url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### :gear: Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo ":heavy_check_mark: **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
